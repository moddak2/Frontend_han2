name: Release

on:
  push:
    tags:
      - 'Test-*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package release asset
        run: zip -r Test-0.0.0.zip dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Test-0.0.0.zip
          name: Test 0.0.0
          generate_release_notes: true